plugins {
    id 'application'
}

group 'be.kuleuven'
version '1.0-SNAPSHOT'

sourceCompatibility = 1.11

repositories {
    mavenCentral()
}

test {
    useJUnitPlatform()
    testLogging.showStandardStreams = true
}

dependencies {
    testImplementation group: 'junit', name: 'junit', version: '4.12'
}
